              <div class="markdown-body">
                
                <h2 id="创建仓库"><a class="markdownIt-Anchor" href="#创建仓库"></a> 创建仓库</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 第一种方式</span><br><span class="hljs-comment"># 克隆远程仓库代码到该目录下，并设置为默认分支</span><br>git <span class="hljs-built_in">clone</span> git@github.com:用户名/仓库名.git<br><br><span class="hljs-comment"># 第二种方式</span><br><span class="hljs-comment"># git初始化，在当前目录下生成一个.git目录</span><br>git init<br><span class="hljs-comment"># 添加远程仓库</span><br>git remote add 远程仓库简称 git@github.com:用户名/仓库名.git<br><span class="hljs-comment"># 查看远程仓库列表（有v的输出包含url）</span><br>git remote (-v)<br></code></pre></td></tr></table></figure>
<h2 id="提交与推送代码"><a class="markdownIt-Anchor" href="#提交与推送代码"></a> 提交与推送代码</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 将所有文件放入缓存区中等待被提交（支持通配符表达式）</span><br>git add *<br><br><span class="hljs-comment"># 提交上面放入缓存区中的所有文件，提交信息linux下为单引号，windows下为双引号</span><br>git commit -m <span class="hljs-string">&quot;提交信息&quot;</span><br><br><span class="hljs-comment"># 将提交的所有文件推送到远程仓库上去</span><br>git push<br></code></pre></td></tr></table></figure>
<h2 id="分支管理"><a class="markdownIt-Anchor" href="#分支管理"></a> 分支管理</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 查看所有的分支，结果列表中带*号的为当前分支</span><br>git branch<br><br><span class="hljs-comment"># 添加分支</span><br>git branch 新分支名称<br><br><span class="hljs-comment"># 切换分支，切换成功后代码会自动更新为目标分支的代码</span><br>git checkout 目标分支<br><br><span class="hljs-comment"># 合并目标分支的代码到当前分支（可能产生合并冲突）</span><br>git merge 目标分支<br><br><span class="hljs-comment"># 查看源分支与目标分支的差异，一般用于合并代码之前</span><br>git diff 源分支 目标分支<br></code></pre></td></tr></table></figure>
<h2 id="本地分支与远程分支映射"><a class="markdownIt-Anchor" href="#本地分支与远程分支映射"></a> 本地分支与远程分支映射</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 使用git在本地新建一个分支后，需要做远程分支关联。如果没有关联，git会在下面的操作中提示你显示的添加关联。关联目的是在执行git pull, git push操作时就不需要指定对应的远程分支，你只要没有显示指定，git pull的时候，就会提示你。</span><br><br><span class="hljs-comment"># 查看本地分支与远程分支的映射关系</span><br>git branch -v<br></code></pre></td></tr></table></figure>
<h2 id="上传到gitee"><a class="markdownIt-Anchor" href="#上传到gitee"></a> 上传到Gitee</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 在Gitee中创建好仓库</span><br><br><span class="hljs-comment"># 进入文件夹，初始化git</span><br>$ git init<br><br><span class="hljs-comment"># 添加远程仓库</span><br>$ git remote add origin https://gitee.com/Chao_j/仓库名称.git<br><br><span class="hljs-comment"># 提交代码</span><br>$ git add *<br><br>$ git commit -m <span class="hljs-string">&quot;提交信息&quot;</span><br><br><span class="hljs-comment"># 推送代码</span><br>$ git push --set-upstream origin master<br></code></pre></td></tr></table></figure>
<h2 id="上传到github"><a class="markdownIt-Anchor" href="#上传到github"></a> 上传到Github</h2>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 在Github中创建好仓库</span><br><br><span class="hljs-comment"># 进入文件夹，初始化git</span><br>$ git init<br><br><span class="hljs-comment"># 添加远程仓库</span><br>$ git remote add origin git@github.com:God-Chao/仓库名称.git<br><br><span class="hljs-comment"># 提交代码</span><br>$ git add *<br><br>$ git commit -m <span class="hljs-string">&quot;提交信息&quot;</span><br><br><span class="hljs-comment"># 推送代码</span><br>$ git push --set-upstream origin master<br></code></pre></td></tr></table></figure>

    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
